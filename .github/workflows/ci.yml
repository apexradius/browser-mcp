name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      # Deps include Playwright/Selenium — CI must never download browser
      # binaries, and the hermetic tests never launch one.
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
      PUPPETEER_SKIP_DOWNLOAD: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Test
        run: npm run test:ci
